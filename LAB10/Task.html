<!DOCTYPE HTML>
<html>
 <head>
 <meta charset="utf-8">
 <title>Формы</title>
</head>
<body>
 <form align="left">
  Форма регистрации
  <p>
  Имя
  <input name="name">
  </p>
  <p>
  e-mail
  <input name="mail">
  </p>
  <p>
  Пароль
  <input type="password" name="pass" size="20">
  </p>
  <p>
  Повтор пароля
  <input type="password" name="pass2" size="20">
  </p>
  Пол
  <input type="radio" name="pol" value="М" checked>мужской
  <input type="radio" name="pol" value="Ж">женский
  <br>
  Увлечения
   <select name="hobby" size="7" multiple>
   <option selected value="pc">компьютеры
   <option value="sport">спорт
   <option value="games">игры
   <option value="animals">животные
   <option value="cars">автомобили
   <option value="clubs">клубы
   <option value="music">музыка 
   </select>
   <p>
   Ваши пожелания
   <textarea <input type="text">
   </textarea>
   </p>
   <input type="submit" value="Отправить">
   <input type="submit" value="Очистить">
 </form>
</body>
</html>
