<!DOCTYPE html>
<html>
    <head>
	<title>Таблица</title>
    </head>
    <body>
	<table rules="all" width="600" height="130" border="2">

		<td style="border: 1.5px solid black"></td>

	    <tr>
	        <td style="border: 1.5px solid black" bgcolor="#009999"><font color="white">Сапфиры</font></td>
	        <td style="border: 1.5px solid black" rowspan="2" align="center">1483</td>
	        <td style="border: 1.5px solid black" align="center">4532</td>
		<td style="border: 1.5px solid black" align="center">6743</td>
	    </tr>
	    <tr>
	        <td style="border: 1.5px solid black" bgcolor="#009999"><font color="white">Рубины</font></td>
		<td style="border: 1.5px solid black" align="center">3835</td>
		<td style="border: 1.5px solid black" align="center">7482</td>
	    </tr>
	    <tr>
		<td style="border: 1.5px solid black" bgcolor="#009999"><font color="white">Алмазы</font></td>
		<td style="border: 1.5px solid black" align="center">683</td>
		<td style="border: 1.5px solid black" colspan="2" align="center">238</td>
	    </tr>
	</table>
    </body>
</html>
